    <!-- Container body -->
    <rect x="0" y="16" width="56" height="60" rx="6" fill="none" stroke="url(#grad1)" stroke-width="4"/>
    <!-- Container layers -->
    <rect x="6" y="24" width="44" height="9" rx="2" fill="url(#grad1)" opacity="0.25"/>
    <rect x="6" y="37" width="34" height="9" rx="2" fill="url(#grad1)" opacity="0.45"/>
    <rect x="6" y="50" width="40" height="9" rx="2" fill="url(#grad1)" opacity="0.65"/>
    <rect x="6" y="63" width="26" height="7" rx="2" fill="url(#grad1)" opacity="0.85"/>
  </g>

  <!-- K8s helm wheel -->
  <g transform="translate(96, 12)">
    <circle cx="26" cy="44" r="26" fill="none" stroke="url(#grad1)" stroke-width="4"/>
    <circle cx="26" cy="44" r="9" fill="url(#grad1)"/>
    <!-- spokes -->
    <line x1="26" y1="18" x2="26" y2="10" stroke="url(#grad1)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="26" y1="70" x2="26" y2="78" stroke="url(#grad1)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="0" y1="44" x2="-8" y2="44" stroke="url(#grad1)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="52" y1="44" x2="60" y2="44" stroke="url(#grad1)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="7.6" y1="25.6" x2="2.8" y2="20.8" stroke="url(#grad1)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="44.4" y1="62.4" x2="49.2" y2="67.2" stroke="url(#grad1)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="44.4" y1="25.6" x2="49.2" y2="20.8" stroke="url(#grad1)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="7.6" y1="62.4" x2="2.8" y2="67.2" stroke="url(#grad1)" stroke-width="4.5" stroke-linecap="round"/>
  </g>

  <!-- Text: XInfra-K8s -->
  <text x="172" y="52" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="url(#grad2)">XInfra</text>

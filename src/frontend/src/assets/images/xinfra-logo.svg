    <rect x="3" y="22" width="12" height="4" rx="1" fill="url(#grad1)" opacity="0.9"/>
  </g>

  <!-- K8s helm wheel -->
  <g transform="translate(38, 6)">
    <circle cx="12" cy="15" r="12" fill="none" stroke="url(#grad1)" stroke-width="2"/>
    <circle cx="12" cy="15" r="4" fill="url(#grad1)"/>
    <line x1="12" y1="3" x2="12" y2="0" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12" y1="27" x2="12" y2="30" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="15" x2="-3" y2="15" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="24" y1="15" x2="27" y2="15" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="3.5" y1="6.5" x2="1.5" y2="4.5" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20.5" y1="23.5" x2="22.5" y2="25.5" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>

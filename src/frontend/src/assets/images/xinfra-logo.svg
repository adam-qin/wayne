  <circle cx="58" cy="28" r="12" fill="none" stroke="url(#grad1)" stroke-width="2"/>
  <circle cx="58" cy="28" r="4" fill="url(#grad1)"/>
  <!-- K8s spokes -->
  <line x1="58" y1="16" x2="58" y2="13" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="58" y1="40" x2="58" y2="43" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="46" y1="28" x2="43" y2="28" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="70" y1="28" x2="73" y2="28" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="49.5" y1="19.5" x2="47" y2="17" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="66.5" y1="36.5" x2="69" y2="39" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="66.5" y1="19.5" x2="69" y2="17" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="49.5" y1="36.5" x2="47" y2="39" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Text XInfra-K8s -->
  <text x="85" y="22" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1D6CEB">XInfra</text>
  <text x="85" y="40" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#00C9DB">K8s</text>

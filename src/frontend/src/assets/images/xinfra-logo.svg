<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="60" viewBox="0 0 160 60">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D6CEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C9DB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1D6CEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C9DB;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Container icon group -->
  <g transform="translate(4, 2)">
    <!-- Container body -->
    <rect x="0" y="8" width="30" height="32" rx="4" fill="none" stroke="url(#grad1)" stroke-width="2.5"/>
    <!-- Container top bar -->
    <rect x="3" y="12" width="24" height="5" rx="1.5" fill="url(#grad1)" opacity="0.25"/>
    <rect x="3" y="19" width="18" height="5" rx="1.5" fill="url(#grad1)" opacity="0.45"/>
    <rect x="3" y="26" width="22" height="5" rx="1.5" fill="url(#grad1)" opacity="0.65"/>
    <rect x="3" y="33" width="14" height="4" rx="1.5" fill="url(#grad1)" opacity="0.85"/>
  </g>

  <!-- K8s helm wheel -->
  <g transform="translate(50, 4)">
    <circle cx="14" cy="24" r="14" fill="none" stroke="url(#grad1)" stroke-width="2.2"/>
    <circle cx="14" cy="24" r="4.5" fill="url(#grad1)"/>
    <!-- spokes -->
    <line x1="14" y1="10" x2="14" y2="6.5" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="14" y1="38" x2="14" y2="41.5" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="24" x2="-3.5" y2="24" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="28" y1="24" x2="31.5" y2="24" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4.1" y1="14.1" x2="1.6" y2="11.6" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="23.9" y1="33.9" x2="26.4" y2="36.4" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="23.9" y1="14.1" x2="26.4" y2="11.6" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4.1" y1="33.9" x2="1.6" y2="36.4" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Text: XInfra-K8s -->
  <text x="91" y="26" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="url(#grad2)">XInfra</text>
  <text x="91" y="48" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#00C9DB" letter-spacing="1">KUBERNETES</text>
</svg>
